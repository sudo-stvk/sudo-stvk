name: Generate GitHub Snake Animation

on:
  # Run automatically every day at midnight
  schedule:
    - cron: "0 0 * * *" 
  
  # Allow manual execution
  workflow_dispatch:

# THIS IS THE FIX FOR ERROR 128
# It explicitly grants the action permission to write to your repository
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Generates the snake game from your contributions graph
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: sudo-stvk
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pushes the generated SVGs to the 'output' branch
      # Updated to v4 to fix the Node.js warning
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0 
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
